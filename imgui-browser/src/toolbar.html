<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XCM Toolbar</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:       #0d1117;
  --surface:  #101820;
  --accent:   #6366f0;
  --accent-lo:rgba(99,102,240,.18);
  --txt:      #e6e9f5;
  --txt-dim:  #666a80;
  --sep:      rgba(99,102,240,.22);
  --ok:       #34d39a;
  --bad:      #f8876e;
  --radius:   7px;
  --bar-h:    44px;
}

html,body{
  width:100%;height:100%;
  background:var(--surface);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  font-size:14px;color:var(--txt);
  user-select:none;-webkit-user-select:none;
  overflow:hidden;
}

html{
  border-left: 1px solid var(--sep);
  border-right: 1px solid var(--sep);
  border-bottom: 1px solid var(--sep);
}

#bar{
  display:flex;align-items:center;
  width:100%;height:var(--bar-h);
  padding:0 8px;gap:2px;
  background:var(--surface);
  border-bottom:1px solid var(--sep);
  border-top:1px solid var(--sep);
  flex-shrink:0;
}

/* ---- nav buttons ---- */
.btn{
  display:flex;align-items:center;justify-content:center;
  width:28px;height:28px;flex-shrink:0;
  background:none;border:none;cursor:pointer;
  border-radius:5px;color:var(--txt);font-size:13px;
  transition:background .12s,color .12s;
  -webkit-app-region:no-drag;
}
.btn:hover{background:var(--accent-lo);}
.btn:active{background:rgba(99,102,240,.28);}
.btn:disabled,.btn[disabled]{color:var(--txt-dim);pointer-events:none;}
.btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* gap after reload */
#gap{width:8px;flex-shrink:0;}

/* ---- url row ---- */
#url-wrap{
  flex:1;min-width:0;
  display:flex;align-items:center;
  height:28px;
  background:var(--bg);
  border:1px solid rgba(99,102,240,.28);
  border-radius:var(--radius);
  padding:0 8px;gap:5px;
  position:relative;overflow:hidden;
}
#url-wrap:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 2px var(--accent-lo);
}

#sec{width:13px;height:13px;flex-shrink:0;}
#sec svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sec-https{color:var(--ok);}
.sec-http {color:var(--bad);}
.sec-other{color:var(--txt-dim);}

#url{
  flex:1;min-width:0;
  background:none;border:none;outline:none;
  color:var(--txt);font-size:14px;
  -webkit-app-region:no-drag;
}
#url::selection{background:rgba(99,102,240,.32);}

#prog{
  position:absolute;bottom:0;left:0;height:2px;
  background:var(--accent);width:0%;
  transition:width .08s linear;
  display:none;
}

/* ---- more button ---- */
#more{
  width:30px;height:28px;
  letter-spacing:.12em;font-size:15px;font-weight:500;
  flex-shrink:0;
  -webkit-app-region:no-drag;
}
#more.active{color:var(--accent);background:var(--accent-lo);}

/* ---- drawer ---- */
#drawer{
  width:100%;
  background:var(--bg);
  border-top:1px solid var(--sep);
  display:none;
  flex-direction:column;
  overflow:hidden;
}
#drawer.open{display:flex;}

#drawer-head{
  display:flex;align-items:center;justify-content:flex-end;
  height:26px;padding:0 4px;
  border-bottom:1px solid var(--sep);
  flex-shrink:0;
}
#drawer-close{
  width:24px;height:22px;
  background:none;border:none;cursor:pointer;
  color:var(--txt-dim);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;
  -webkit-app-region:no-drag;
}
#drawer-close:hover{background:var(--accent-lo);color:var(--txt);}
#drawer-close svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

#drawer-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  padding:4px;
}

.ditem{
  display:flex;align-items:center;
  padding:7px 10px;gap:8px;
  cursor:pointer;color:var(--txt);
  border-radius:6px;
  font-size:13px;
  transition:background .1s;
}
.ditem:hover{background:var(--accent-lo);}
.ditem:active{background:rgba(99,102,240,.28);}
.ditem.disabled{color:var(--txt-dim);pointer-events:none;}
.ditem.full{grid-column:1/-1;}

.di-icon{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.di-icon svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.di-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.di-key{color:var(--txt-dim);font-size:10px;flex-shrink:0;padding-left:6px;}
.drawer-sep{grid-column:1/-1;height:1px;background:var(--sep);margin:3px 6px;}
</style>
</head>
<body>
<div id="bar">

  <!-- back -->
  <button class="btn" id="btn-back" title="Back (Cmd+[)" onclick="xcm('back')">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <!-- forward -->
  <button class="btn" id="btn-fwd" title="Forward (Cmd+])" onclick="xcm('fwd')">
    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
  </button>

  <!-- reload / stop -->
  <button class="btn" id="btn-reload" title="Reload (Cmd+R)" onclick="xcm('reload')">
    <svg id="ico-reload" viewBox="0 0 24 24">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    <svg id="ico-stop" viewBox="0 0 24 24" style="display:none">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <div id="gap"></div>

  <!-- url bar -->
  <div id="url-wrap">
    <span id="sec" class="sec-other">
      <svg id="ico-globe" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <svg id="ico-lock" viewBox="0 0 24 24" style="display:none">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <svg id="ico-unlock" viewBox="0 0 24 24" style="display:none">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
      </svg>
    </span>
    <input id="url" type="text" spellcheck="false" autocomplete="off"
           placeholder="Search or enter URL"
           onkeydown="onUrlKey(event)"
           onfocus="onUrlFocus()"
           onblur="onUrlBlur()">
    <div id="prog"></div>
  </div>

  <button class="btn" id="more" title="Tools and Settings" onclick="toggleDrawer()">&#xB7;&#xB7;&#xB7;</button>
</div>

<!-- slide-down drawer, hidden by default -->
<div id="drawer">
  <div id="drawer-head">
    <button id="drawer-close" title="Collapse" onclick="closeDrawer()">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
  </div>
  <div id="drawer-grid">
    <div class="ditem" id="di-back" onclick="drawerAction('back')">
      <span class="di-icon"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></span>
      <span class="di-label">Back</span>
    </div>
    <div class="ditem" id="di-fwd" onclick="drawerAction('fwd')">
      <span class="di-icon"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></span>
      <span class="di-label">Forward</span>
    </div>
    <div class="ditem full" id="di-reload" onclick="drawerAction('reload')">
      <span class="di-icon">
        <svg id="di-ico-reload" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <svg id="di-ico-stop" viewBox="0 0 24 24" style="display:none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </span>
      <span class="di-label" id="di-reload-lbl">Reload</span>
    </div>
    <div class="drawer-sep"></div>
    <div class="ditem full" id="di-devt" onclick="drawerAction('devt')">
      <span class="di-icon"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>
      <span class="di-label" id="di-devt-lbl">Developer Tools</span>
    </div>
    <div class="ditem full" id="di-js" onclick="drawerAction('js')">
      <span class="di-icon"><svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg></span>
      <span class="di-label" id="di-js-lbl">Disable JavaScript</span>
    </div>
    <div class="drawer-sep"></div>
    <div class="ditem" id="di-bm" onclick="drawerAction('bm')">
      <span class="di-icon"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></span>
      <span class="di-label" id="di-bm-lbl">Bookmark</span>
    </div>
    <div class="ditem" onclick="drawerAction('showbm')">
      <span class="di-icon"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span>
      <span class="di-label">Bookmarks</span>
    </div>
    <div class="ditem full" onclick="drawerAction('hist')">
      <span class="di-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
      <span class="di-label">History</span>
    </div>
    <div class="drawer-sep"></div>
    <div class="ditem full" onclick="drawerAction('clear_cache')">
      <span class="di-icon"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></span>
      <span class="di-label">Clear Cache</span>
    </div>
  </div>
</div>

<script>
// ---- bridge ----
function xcm(action, data){
  var msg = {action: action};
  if (data !== undefined) msg.data = data;
  try{ window.webkit.messageHandlers.xcmBridge.postMessage(msg); }
  catch(e){ console.warn('xcmBridge not available', e); }
}

// ---- state (set by native side via evaluateJavaScript) ----
var _state = {
  url: '', loading: false, progress: 0,
  canBack: false, canFwd: false,
  https: false, http: false,
  devtOpen: false, jsOn: true, isBm: false
};
var _pendingUrl = null;  // URL typed by user, shown until webview starts loading

function xcmSetState(s){
  _state = s;
  var urlEl    = document.getElementById('url');
  var focused  = document.activeElement === urlEl;

  if (!focused) {
    // Clear pending URL once the webview acknowledges navigation (loading starts)
    if (_pendingUrl && s.loading) _pendingUrl = null;
    urlEl.value = _pendingUrl || s.url || '';
  }

  // back / fwd
  document.getElementById('btn-back').disabled  = !s.canBack;
  document.getElementById('btn-fwd').disabled   = !s.canFwd;

  // reload/stop
  document.getElementById('ico-reload').style.display = s.loading ? 'none'  : '';
  document.getElementById('ico-stop').style.display   = s.loading ? ''      : 'none';
  document.getElementById('btn-reload').title = s.loading ? 'Stop (Esc)' : 'Reload (Cmd+R)';

  // progress
  var prog = document.getElementById('prog');
  if (s.loading && s.progress > 0 && s.progress < 1){
    prog.style.display = 'block';
    prog.style.width   = (s.progress * 100).toFixed(1) + '%';
  } else {
    prog.style.display = 'none';
    prog.style.width   = '0%';
  }

  // security icon
  var sec = document.getElementById('sec');
  document.getElementById('ico-globe').style.display  = (!s.https && !s.http) ? '' : 'none';
  document.getElementById('ico-lock').style.display   = s.https ? '' : 'none';
  document.getElementById('ico-unlock').style.display = (s.http && !s.https) ? '' : 'none';
  sec.className = s.https ? 'sec-https' : (s.http ? 'sec-http' : 'sec-other');

  // dropdown labels
  document.getElementById('di-reload-lbl').textContent = s.loading ? 'Stop' : 'Reload';
  document.getElementById('di-devt-lbl').textContent   = s.devtOpen ? 'Close Developer Tools' : 'Developer Tools';
  document.getElementById('di-js-lbl').textContent     = s.jsOn ? 'Disable JavaScript' : 'Enable JavaScript';
  document.getElementById('di-bm-lbl').textContent     = s.isBm ? 'Remove Bookmark' : 'Bookmark This Page';

  document.getElementById('di-back').className = 'ditem' + (s.canBack ? '' : ' disabled');
  document.getElementById('di-fwd').className  = 'ditem' + (s.canFwd  ? '' : ' disabled');

  document.getElementById('more').style.color =
    (s.devtOpen || s.isBm || !s.jsOn) ? 'var(--accent)' : '';

  // sync drawer loading icon
  if (document.getElementById('di-ico-reload')) {
    document.getElementById('di-ico-reload').style.display = s.loading ? 'none' : '';
    document.getElementById('di-ico-stop').style.display   = s.loading ? ''     : 'none';
  }
}

// ---- url input ----
function onUrlKey(e){
  if (e.key === 'Enter'){
    var v = e.target.value.trim();
    if (v){
      if (v.indexOf('://') === -1 && v.indexOf(' ') === -1)
        v = 'https://' + v;
      _pendingUrl = v;
      xcm('navigate', v);
      e.target.blur();
    }
  }
  if (e.key === 'Escape'){
    _pendingUrl = null;
    e.target.value = _state.url || '';
    e.target.blur();
  }
}
function onUrlFocus(){ xcm('urlfocus'); }
function onUrlBlur() { xcm('urlblur');  }

// ---- drawer ----
var DRAWER_OPEN = false;
var DRAWER_H    = 270;  // fixed height of drawer panel in px

function openDrawer(){
  if (DRAWER_OPEN) return;
  DRAWER_OPEN = true;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('more').classList.add('active');
  xcm('dropdownOpen', String(DRAWER_H));
}
function closeDrawer(){
  if (!DRAWER_OPEN) return;
  DRAWER_OPEN = false;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('more').classList.remove('active');
  xcm('dropdownClose');
}
function closeDrawerSilent(){
  DRAWER_OPEN = false;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('more').classList.remove('active');
}
function toggleDrawer(){
  if (DRAWER_OPEN) closeDrawer(); else openDrawer();
}
function drawerAction(action){
  closeDrawer();
  setTimeout(function(){ xcm(action); }, 40);
}
</script>
</body>
</html>
