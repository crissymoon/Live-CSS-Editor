# proxy-auth.conf
# Reverse proxy for OpenAI and Anthropic auth / billing endpoints.
#
# Included from nginx.conf inside the http {} block.
#
# Why a separate proxy server is needed
# --------------------------------------
# Both OpenAI and Anthropic sit behind Cloudflare Bot Management. When a C++
# HTTP client makes requests directly it lacks the JA3 TLS fingerprint, the
# TLS GREASE extension, and the sec-ch-ua / Cookie headers that Cloudflare
# expects from real Chrome. Proxying through nginx on localhost lets the C++
# client send requests to 127.0.0.1 while nginx handles the upstream TLS
# handshake with a proper SNI + trusted certificate chain.
#
# Buffer sizing rationale
# -----------------------
# Cloudflare and OpenAI/Anthropic set several large cookies (_cfuvid,
# __cf_clearance, __cf_bm, __Secure-next-auth.session-token, etc.) whose
# combined size can exceed 8k -- the nginx default proxy_buffer_size.  When a
# response header block exceeds proxy_buffer_size nginx either falls back to a
# temp file (slow) or returns a 502.  Setting proxy_buffer_size 16k ensures
# the full header block always fits in a single buffer.
#
# proxy_buffers 8 128k: holds up to 1 MB of response body in memory before
# writing to a temp file.  Auth and billing JSON responses are small but
# Stripe checkout pages can be 200-400 KB.
#
# proxy_busy_buffers_size must be <= proxy_buffer_size + proxy_buffers total,
# so 256k is safe with 8 x 128k.
#
# large_client_header_buffers
# ---------------------------
# The outgoing request from C++ carries the full Cloudflare + Stripe cookie
# jar as a single Cookie: header.  The default 4 x 8k (32k total) is
# insufficient when __cf_clearance + __cf_bm + _cfuvid + stripe session tokens
# are all present at once.  4 x 16k = 64k total covers worst-case cookie
# bloat from both Cloudflare and Stripe Link.
#
# SNI / TLS handshake
# -------------------
# proxy_ssl_server_name on  -- sends SNI during the upstream TLS handshake so
# the upstream (Cloudflare edge) presents the correct certificate for the
# virtual host.  Without SNI Cloudflare returns a generic wildcard cert and
# the hostname check fails or routes to the wrong backend.
# proxy_ssl_name            -- sets the SNI hostname explicitly.  Required
# when the proxy_pass URL is an IP or does not match the intended vhost.
# proxy_ssl_protocols       -- restrict to TLS 1.2 / 1.3 only.
# proxy_ssl_ciphers         -- prefer AES-GCM + ChaCha20 matching what real
# Chrome 131 sends in its ClientHello so JA3 fingerprint is less anomalous.
#
# Cache bypass for auth pages
# ---------------------------
# Cloudflare challenges and OAuth tokens are always unique per-visit.  Any
# nginx cache layer must be completely bypassed for these endpoints or stale
# challenge responses / expired tokens will be served.  proxy_no_cache and
# proxy_cache_bypass with value 1 achieve an unconditional bypass even when
# a cache zone is configured globally.
#
# Header hygiene
# --------------
# proxy_hide_header removes upstream headers that would confuse the C++ client
# or leak implementation details.  The Vary: * header from Cloudflare is
# especially problematic -- it prevents any client-side caching and causes
# some HTTP clients to treat the response as uncacheable stale.
#
# X-Forwarded-For is cleared on the upstream request.  Sending the real
# client IP to Cloudflare would not help (the IP is 127.0.0.1 from localhost)
# and an unexpected forwarded-for header can trigger Cloudflare's IP
# reputation check against the private range, causing a silent block.

# ── Auth proxy server ───────────────────────────────────────────────────────
# Note: named upstream blocks with hostnames require DNS resolution at nginx
# startup and fail with "host not found in upstream" on machines without
# internet access at init time. proxy_pass URLs are used directly instead;
# nginx will resolve them lazily via the system resolver at request time.
server {
    listen  127.0.0.1:8445 ssl;
    server_name localhost;

    # Reuse the same mkcert cert as the main app server.
    ssl_certificate     /Users/mac/Documents/live-css/server/certs/localhost.pem;
    ssl_certificate_key /Users/mac/Documents/live-css/server/certs/localhost-key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;  # let client order ciphers -- matches real Chrome behavior
    ssl_session_cache   shared:PROXY_SSL:10m;
    ssl_session_timeout 10m;

    # ── Global proxy TLS settings (upstream side) ──────────────────────────
    # These govern the TLS handshake nginx makes TO the upstream (Cloudflare).
    proxy_ssl_protocols     TLSv1.2 TLSv1.3;
    proxy_ssl_ciphers       TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    proxy_ssl_session_reuse on;   # reuse TLS session tickets -- reduces handshake latency
    proxy_ssl_verify        on;
    proxy_ssl_trusted_certificate /etc/ssl/cert.pem;  # macOS system root bundle

    # ── Request header buffer sizing ───────────────────────────────────────
    # 4 x 16k = 64k total.  Covers worst-case combined Cloudflare + Stripe
    # + OpenAI/Anthropic cookie headers in a single request.
    large_client_header_buffers 4 16k;
    client_header_buffer_size   4k;

    # ── Response buffer sizing ──────────────────────────────────────────────
    # proxy_buffer_size:      first buffer -- must hold entire response header
    #                         block.  16k covers all CF + CORS + auth headers.
    # proxy_buffers:          8 x 128k = 1 MB in-memory body buffer.
    # proxy_busy_buffers_size: max buffers in active use at once (<= buffers total).
    # proxy_temp_file_write_size: write chunk size when body spills to temp file.
    proxy_buffer_size          16k;
    proxy_buffers              8 128k;
    proxy_busy_buffers_size    256k;
    proxy_temp_file_write_size 512k;
    proxy_max_temp_file_size   1024m;

    # ── Timeouts ─────────────────────────────────────────────────────────────
    proxy_connect_timeout  15s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    # ── Cache bypass for all auth/billing locations ─────────────────────────
    # These are set at the server level so every location block underneath
    # inherits them without needing per-location duplication.
    proxy_no_cache      1;
    proxy_cache_bypass  1;
    add_header X-Cache-Status BYPASS always;

    # ── Shared header hygiene ───────────────────────────────────────────────
    # Headers nginx adds by default that can confuse upstream bot detection
    # or break Origin/Host consistency checks on auth endpoints.
    proxy_set_header  Connection        "";     # use keep-alive to upstream
    proxy_http_version 1.1;                     # required for keepalive upstreams

    # Do NOT forward X-Forwarded-For to Cloudflare-protected upstreams.
    # From Cloudflare's perspective the request comes from our server IP.
    # Sending 127.0.0.1 as the forwarded-for value triggers Cloudflare's
    # private-range IP reputation block (CF-IPCountry: T1).
    proxy_set_header  X-Forwarded-For  "";
    proxy_set_header  X-Real-IP        "";

    # Always send HTTPS as the forwarded protocol so auth servers issue
    # HTTPS redirect URIs instead of HTTP ones.
    proxy_set_header  X-Forwarded-Proto https;

    # Hide upstream headers that reveal internal infrastructure or cause
    # the C++ client to misbehave.
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_hide_header Via;
    proxy_hide_header X-Request-Id;
    proxy_hide_header CF-RAY;
    proxy_hide_header CF-Cache-Status;
    proxy_hide_header CF-Edge-IP;
    # Vary: * prevents any downstream caching and confuses some HTTP clients
    # that try to do conditional GET on cached auth responses.
    proxy_hide_header Vary;

    # Pass Set-Cookie unchanged so __cf_clearance / __stripe_mid reach the client.
    proxy_pass_header Set-Cookie;

    # ── Cookie domain rewriting ─────────────────────────────────────────────
    # Rewrite cookie domains from the upstream host to localhost so the C++
    # client (which talks to 127.0.0.1:8445) can store and send them back.
    proxy_cookie_domain auth.openai.com       localhost;
    proxy_cookie_domain openai.com            localhost;
    proxy_cookie_domain platform.openai.com   localhost;
    proxy_cookie_domain claude.ai             localhost;
    proxy_cookie_domain platform.claude.com   localhost;
    proxy_cookie_domain anthropic.com         localhost;
    proxy_cookie_domain api.anthropic.com     localhost;
    proxy_cookie_domain console.anthropic.com localhost;
    proxy_cookie_domain link.stripe.com       localhost;
    proxy_cookie_domain stripe.com            localhost;

    # ── Access log ──────────────────────────────────────────────────────────
    access_log /Users/mac/Documents/live-css/server/logs/proxy-auth-access.log;
    error_log  /Users/mac/Documents/live-css/server/logs/proxy-auth-error.log warn;


    # ════════════════════════════════════════════════════════════════════════
    # OpenAI AUTH  --  auth.openai.com
    # Handles the OpenAI login, OAuth callback, and session endpoints.
    # Host + Origin must be set to auth.openai.com exactly.  The Referer
    # must point to the same host on OAuth callbacks or the server returns
    # a 400 "Route Error: Unknown error".
    # ════════════════════════════════════════════════════════════════════════
    location /openai-auth/ {
        set $up_host "auth.openai.com";
        set $up_url  "https://auth.openai.com";
        proxy_pass            $up_url/;
        proxy_ssl_server_name on;
        proxy_ssl_name        $up_host;
        proxy_set_header      Host       $up_host;
        proxy_set_header      Origin     $up_url;
        proxy_set_header      Referer    $up_url/;
        # Rewrite Location redirects so the C++ client stays within this proxy.
        proxy_redirect        $up_url/  /openai-auth/;
    }

    # ════════════════════════════════════════════════════════════════════════
    # OpenAI PLATFORM / CHAT  --  platform.openai.com + chat.openai.com
    # Chat and platform share the same Cloudflare zone but different origins.
    # ════════════════════════════════════════════════════════════════════════
    location /openai-chat/ {
        set $up_host "chat.openai.com";
        set $up_url  "https://chat.openai.com";
        proxy_pass            $up_url/;
        proxy_ssl_server_name on;
        proxy_ssl_name        $up_host;
        proxy_set_header      Host       $up_host;
        proxy_set_header      Origin     $up_url;
        proxy_set_header      Referer    $up_url/;
        proxy_redirect        $up_url/  /openai-chat/;
    }

    location /openai-api/ {
        set $up_host "auth.openai.com";
        set $up_url  "https://auth.openai.com";
        proxy_pass            $up_url/;
        proxy_ssl_server_name on;
        proxy_ssl_name        $up_host;
        proxy_set_header      Host       $up_host;
        proxy_set_header      Origin     $up_url;
        proxy_set_header      Referer    $up_url/;
        proxy_redirect        $up_url/  /openai-auth/;
    }

    # ════════════════════════════════════════════════════════════════════════
    # Anthropic AUTH + CLAUDE  --  claude.ai / console.anthropic.com
    # ════════════════════════════════════════════════════════════════════════
    location /claude-auth/ {
        set $up_host "claude.ai";
        set $up_url  "https://claude.ai";
        proxy_pass            $up_url/;
        proxy_ssl_server_name on;
        proxy_ssl_name        $up_host;
        proxy_set_header      Host       $up_host;
        proxy_set_header      Origin     $up_url;
        proxy_set_header      Referer    $up_url/;
        proxy_redirect        $up_url/  /claude-auth/;
    }

    # ════════════════════════════════════════════════════════════════════════
    # Anthropic PLATFORM  --  platform.claude.com
    # Billing and settings pages for Claude subscriptions.
    # ════════════════════════════════════════════════════════════════════════
    location /platform-claude/ {
        set $up_host "platform.claude.com";
        set $up_url  "https://platform.claude.com";
        proxy_pass            $up_url/;
        proxy_ssl_server_name on;
        proxy_ssl_name        $up_host;
        proxy_set_header      Host       $up_host;
        proxy_set_header      Origin     $up_url;
        proxy_set_header      Referer    $up_url/;
        proxy_redirect        $up_url/  /platform-claude/;
    }

    # ════════════════════════════════════════════════════════════════════════
    # OpenAI PLATFORM  --  platform.openai.com
    # Billing and account settings for OpenAI subscriptions.
    # ════════════════════════════════════════════════════════════════════════
    location /openai-platform/ {
        set $up_host "platform.openai.com";
        set $up_url  "https://platform.openai.com";
        proxy_pass            $up_url/;
        proxy_ssl_server_name on;
        proxy_ssl_name        $up_host;
        proxy_set_header      Host       $up_host;
        proxy_set_header      Origin     $up_url;
        proxy_set_header      Referer    $up_url/;
        proxy_redirect        $up_url/  /openai-platform/;
    }

    # ════════════════════════════════════════════════════════════════════════
    # Anthropic CONSOLE  --  console.anthropic.com
    # Billing and settings pages for Anthropic API console.
    # ════════════════════════════════════════════════════════════════════════
    location /anthropic-console/ {
        set $up_host "console.anthropic.com";
        set $up_url  "https://console.anthropic.com";
        proxy_pass            $up_url/;
        proxy_ssl_server_name on;
        proxy_ssl_name        $up_host;
        proxy_set_header      Host       $up_host;
        proxy_set_header      Origin     $up_url;
        proxy_set_header      Referer    $up_url/;
        proxy_redirect        $up_url/  /anthropic-console/;
    }

    location /anthropic-api/ {
        set $up_host "api.anthropic.com";
        set $up_url  "https://api.anthropic.com";
        proxy_pass            $up_url/;
        proxy_ssl_server_name on;
        proxy_ssl_name        $up_host;
        proxy_set_header      Host       $up_host;
        proxy_set_header      Origin     $up_url;
        proxy_set_header      Referer    $up_url/;
        proxy_redirect        $up_url/  /anthropic-api/;
    }

    # ════════════════════════════════════════════════════════════════════════
    # Stripe Link + billing
    # Stripe billing iframes (loaded by OpenAI and Anthropic billing pages)
    # set __stripe_mid and __stripe_sid inside the iframe context.
    # These cookies must be extracted AFTER the iframe has loaded to network
    # idle -- the Stripe JS challenge completes async and the cookies are not
    # set synchronously on DOMContentLoaded.
    #
    # IMPORTANT: the Stripe iframe origin is link.stripe.com or pay.stripe.com.
    # The Host header must match exactly or Stripe returns a 400.
    # ════════════════════════════════════════════════════════════════════════
    location /stripe-link/ {
        set $up_host "link.stripe.com";
        set $up_url  "https://link.stripe.com";
        proxy_pass            $up_url/;
        proxy_ssl_server_name on;
        proxy_ssl_name        $up_host;
        proxy_set_header      Host       $up_host;
        proxy_set_header      Origin     $up_url;
        proxy_set_header      Referer    $up_url/;
        proxy_redirect        $up_url/  /stripe-link/;
    }

    location /stripe-pay/ {
        set $up_host "pay.stripe.com";
        set $up_url  "https://pay.stripe.com";
        proxy_pass            $up_url/;
        proxy_ssl_server_name on;
        proxy_ssl_name        $up_host;
        proxy_set_header      Host       $up_host;
        proxy_set_header      Origin     $up_url;
        proxy_set_header      Referer    $up_url/;
        proxy_redirect        $up_url/  /stripe-pay/;
    }

    # ── Health check ────────────────────────────────────────────────────────
    location = /proxy-health {
        access_log off;
        return 200 "proxy-auth ok\n";
        add_header Content-Type text/plain;
    }
}
